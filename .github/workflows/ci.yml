name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./...
